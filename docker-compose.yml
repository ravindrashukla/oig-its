services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oig
      POSTGRES_PASSWORD: oig_dev_2026
      POSTGRES_DB: oig_its
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: oig_minio
      MINIO_ROOT_PASSWORD: oig_minio_secret_2026
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: oig_search_master_key_2026
    volumes:
      - meili_data:/meili_data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  minio_data:
  meili_data:
